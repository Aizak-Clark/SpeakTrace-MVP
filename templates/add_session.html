<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>SpeakTrace | Добавить текст</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Inter', sans-serif; }
        .form-card { max-width: 600px; margin: 50px auto; border: none; border-radius: 16px; }
        .btn-primary { background-color: #6366f1; border: none; padding: 12px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card form-card shadow-lg p-4">
        <h3 class="fw-bold mb-4">Новый анализ речи</h3>
        
        <form action="/add" method="post" enctype="multipart/form-data">
            <div class="mb-3">
                <label class="form-label fw-bold small text-muted">НАЗВАНИЕ СЕССИИ</label>
                <input type="text" name="title" class="form-control" placeholder="Напр: Подготовка к retake" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold small text-muted">ВСТАВИТЬ ТЕКСТ ВРУЧНУЮ</label>
                <textarea name="manual_text" class="form-control" rows="5" placeholder="Введите или вставьте текст здесь..."></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold small text-muted">ИЛИ ЗАГРУЗИТЬ .TXT ФАЙЛ</label>
                <input type="file" name="file" class="form-control" accept=".txt">
            </div>

            <div class="row mb-4">
                <div class="col-md-6">
                    <label class="form-label fw-bold small text-muted">ИСТОЧНИК</label>
                    <select name="source" class="form-select">
                        <option value="Manual">Ручной ввод</option>
                        <option value="File">Файл .txt</option>
                        <option value="Live">Запись с микрофона</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold small text-muted">ДЛИТЕЛЬНОСТЬ (МИН)</label>
                    <input type="number" name="duration" class="form-control" value="5">
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 fw-bold">ЗАПУСТИТЬ АНАЛИЗ</button>
            <a href="/" class="btn btn-link w-100 mt-2 text-muted text-decoration-none">← Отмена</a>
        </form>
    </div>
</div>

</body>
</html>
